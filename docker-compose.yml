services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4175
    volumes:
      - suguang_generated:/app/outputs/assets/generated
      - suguang_jobs:/app/work/creator-image-jobs
      - suguang_games:/app/work/published-games
    expose:
      - "4175"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4175/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      SUGUANG_DOMAIN: ${SUGUANG_DOMAIN}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  suguang_generated:
  suguang_jobs:
  suguang_games:
  caddy_data:
  caddy_config:
