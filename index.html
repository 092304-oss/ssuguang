<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>替你活到明天 | 分支文游 MVP</title>
    <link rel="stylesheet" href="./styles.css?v=20260623-cover1" />
  </head>
  <body>
    <main class="game-shell is-title" data-scene="home" data-effect="rain" data-cast="none">
      <section class="stage" aria-label="替你活到明天 玩家画面">
        <div class="scene-layer scene-bg" aria-hidden="true"></div>
        <div class="scene-layer scene-soft-focus" aria-hidden="true"></div>
        <div class="scene-layer rain-layer" aria-hidden="true"></div>
        <div class="scene-layer vhs-layer" aria-hidden="true"></div>
        <div class="scene-layer flash-layer" aria-hidden="true"></div>
        <div class="scene-layer vignette" aria-hidden="true"></div>

        <nav class="top-menu" aria-label="游戏功能">
          <button class="menu-trigger" id="menuBtn" type="button" aria-label="菜单" title="菜单">☰</button>
          <div class="menu-popover" id="menuPopover" aria-label="菜单项">
            <button id="homeBtn" type="button">回标题</button>
            <button id="backBtn" type="button">回看上一幕</button>
            <button id="saveBtn" type="button">存档</button>
            <button id="loadBtn" type="button">读档</button>
            <button id="galleryBtn" type="button">结局图鉴</button>
            <button id="soundBtn" type="button">背景音乐</button>
          </div>
        </nav>

        <div class="chapter-tag" id="chapterPill">第一章 · 23:12</div>

        <div class="title-screen is-visible" id="titleScreen">
          <!-- 封面图层 -->
          <div class="ts-cover"></div>
          <!-- 左侧装饰色块 -->
          <div class="ts-slab ts-slab-left"></div>
          <!-- 底部渐变遮罩 -->
          <div class="ts-gradient"></div>
          <!-- 装饰竖线组 -->
          <div class="ts-lines">
            <span></span><span></span><span></span>
          </div>
          <!-- 左上角标签 -->
          <div class="ts-badge">
            <span class="ts-badge-en">VISUAL NOVEL</span>
            <span class="ts-badge-zh">女性向 · 悬疑</span>
          </div>
          <!-- 标题区（右下） -->
          <div class="ts-title-block">
            <div class="ts-title-sub">替你活到明天</div>
            <h1 class="ts-title-main">替你<br>活到<br>明天</h1>
            <p class="ts-tagline">今晚十二点前<br>你必须选一个人替你活到明天</p>
          </div>
          <!-- 操作按钮 -->
          <div class="ts-actions">
            <button class="primary-action" id="startBtn" type="button">开始游戏</button>
            <button class="secondary-action" id="continueBtn" type="button">继续读档</button>
            <button class="secondary-action" id="titleGalleryBtn" type="button">结局回收</button>
          </div>
          <!-- 底部装饰条 -->
          <div class="ts-footer">
            <span>LIVE FOR YOU · 替你活到明天</span>
            <span>© 2026</span>
          </div>
        </div>

        <aside class="story-prop" id="mediaCard" aria-live="polite">
          <div class="prop-device" id="mediaDevice">
            <div class="media-topline" id="mediaTopline">23:17</div>
            <div class="media-body" id="mediaBody"></div>
          </div>
        </aside>

        <section class="choice-dock" id="choiceDock" aria-label="选择">
          <div class="choice-list" id="choiceList"></div>
        </section>

        <section class="text-dock" id="dialoguePanel" aria-live="polite">
          <div class="speaker-row">
            <span class="speaker" id="speakerName">旁白</span>
            <span class="node-count" id="nodeCount">01</span>
          </div>
          <p class="dialogue-text" id="dialogueText"></p>
          <span class="continue-hint" id="continueHint">点击屏幕继续</span>
        </section>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </section>
    </main>

    <dialog class="modal" id="saveModal">
      <form method="dialog" class="modal-inner">
        <header class="modal-header">
          <div>
            <p class="modal-kicker">Archive</p>
            <h2 id="modalTitle">存档</h2>
          </div>
          <button class="modal-close" value="close" aria-label="关闭" title="关闭">×</button>
        </header>
        <div class="slot-grid" id="slotGrid"></div>
      </form>
    </dialog>

    <dialog class="modal" id="galleryModal">
      <form method="dialog" class="modal-inner gallery-inner">
        <header class="modal-header">
          <div>
            <p class="modal-kicker">Endings</p>
            <h2>结局图鉴</h2>
            <p class="modal-subtitle">点击已解锁结局，查看完整释义和回收条件。</p>
          </div>
          <button class="modal-close" value="close" aria-label="关闭" title="关闭">×</button>
        </header>
        <div class="gallery-layout">
          <div class="ending-grid" id="endingGrid"></div>
          <article class="ending-detail" id="endingDetail">
            <p class="detail-kicker">未选择结局</p>
            <h3>先点一张已解锁卡片</h3>
            <p>这里会显示结局含义、关键选择和角色后续。</p>
          </article>
        </div>
      </form>
    </dialog>

    <script src="./game.js?v=20260623-bgm2"></script>
  </body>
</html>
